# Starship prompt configuration (TokyoNight Storm colors + Nerd Font Symbols preset)

add_newline = true

[character]
success_symbol = "[έηε](bold #9ece6a)"
error_symbol = "[έεΩ](bold #f7768e)"

[directory]
truncation_length = 3
truncate_to_repo = true
read_only = " ≤░│Ο"
style = "bold #c0caf5"

[git_branch]
symbol = " "
style = "bold #7aa2f7"

[git_status]
style = "bold #f7768e"

[nix_shell]
symbol = "ΎΝΥ "
format = "via [$symbol$state]($style) "
style = "bold #73daca"

[cmd_duration]
min_time = 2000
format = "took [$duration]($style) "
style = "bold #e0af68"

